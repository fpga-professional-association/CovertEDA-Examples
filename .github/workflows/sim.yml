name: Simulation Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cocotb
        run: pip install -r requirements-sim.txt

      - name: Run all simulation tests
        run: python run_all_tests.py --parallel 4

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-results
          path: tb/**/results.xml
